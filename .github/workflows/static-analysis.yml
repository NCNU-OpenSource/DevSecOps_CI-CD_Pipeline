name: Track A - Static Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  biome:
    name: Biome Lint & Format
    runs-on: arc-runner-set
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Run Biome CI
        run: biome ci --reporter=github . 2>&1 | tee biome-report.txt

      - name: Upload Biome Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: biome-report
          path: biome-report.txt
