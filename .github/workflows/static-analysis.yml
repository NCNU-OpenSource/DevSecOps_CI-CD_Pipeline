name: Track A - Static Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  biome:
    name: Biome Lint & Format
    runs-on: arc-runner-set
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Biome
        run: npm install --save-dev @biomejs/biome

      - name: Run Biome
        run: npx biome ci --reporter=github .
