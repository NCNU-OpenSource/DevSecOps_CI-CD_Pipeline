name: CD Staging

on:
  workflow_run:
    workflows:
      - Main Build
    types:
      - completed
    branches:
      - main

concurrency:
  group: cd-staging-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  REGISTRY: harbor.jlsa.local:30443
  IMAGE_NAME: ci/youtube-music-bot
  APP_NAME: youtube-music-bot
  APP_PORT: "3000"

  STAGING_NAMESPACE: staging-youtube-music-bot
  STAGING_NODE_PORT: "31081"

  STAGING_DAST_FAIL_ON_WARN: "true"
  ZAP_IMAGE: harbor.jlsa.local:30443/ci/zap-stable:stable

  ARGOCD_NAMESPACE: argocd
  ARGOCD_STAGING_APP: youtube-music-bot-staging

  GITOPS_REPO_URL: https://github.com/Julie08080808/youtube-music-bot-gitops.git
  GITOPS_REPO_BRANCH: main
  GITOPS_STAGING_PATH: apps/youtube-music-bot/overlays/staging

jobs:
  deploy-staging:
    name: Update GitOps Staging
    runs-on: arc-runner-set
    timeout-minutes: 20
    environment: staging

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Check Runner Tools
        run: |
          set -euo pipefail

          echo "Checking tools baked into ARC runner image..."
          kubectl version --client
          jq --version
          yq --version
          git --version
          curl --version | head -1
          python3 --version

      - name: Configure Kubernetes Auth
        env:
          K8S_KUBECONFIG_B64: ${{ secrets.K8S_KUBECONFIG_B64 }}
        run: |
          set -euo pipefail

          if [ -z "${K8S_KUBECONFIG_B64:-}" ]; then
            echo "K8S_KUBECONFIG_B64 is empty."
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/kube"

          printf "%s" "$K8S_KUBECONFIG_B64" \
            | base64 -d > "$RUNNER_TEMP/kube/config"

          chmod 600 "$RUNNER_TEMP/kube/config"

          echo "KUBECONFIG=$RUNNER_TEMP/kube/config" >> "$GITHUB_ENV"
          export KUBECONFIG="$RUNNER_TEMP/kube/config"

          echo "Testing Kubernetes API access..."
          kubectl get --raw=/version

          echo "Current context:"
          kubectl config current-context

      - name: Download Main Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: main-build-artifacts
          path: main-build-artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Resolve Image Digest
        run: |
          set -euo pipefail

          echo "Downloaded artifacts:"
          find main-build-artifacts -maxdepth 2 -type f -print

          IMAGE_METADATA="main-build-artifacts/image-metadata.txt"

          if [ ! -f "${IMAGE_METADATA}" ]; then
            echo "image-metadata.txt not found."
            exit 1
          fi

          echo "Image metadata:"
          cat "${IMAGE_METADATA}"

          SHORT_SHA="$(grep -E '^SHORT_SHA=' "${IMAGE_METADATA}" | tail -1 | sed 's/^SHORT_SHA=//')"
          IMAGE_DIGEST_VALUE="$(grep -E '^IMAGE_DIGEST_VALUE=' "${IMAGE_METADATA}" | tail -1 | sed 's/^IMAGE_DIGEST_VALUE=//')"
          IMAGE_DIGEST="$(grep -E '^IMAGE_DIGEST=' "${IMAGE_METADATA}" | tail -1 | sed 's/^IMAGE_DIGEST=//')"

          if [ -z "${SHORT_SHA}" ] || [ -z "${IMAGE_DIGEST_VALUE}" ] || [ -z "${IMAGE_DIGEST}" ]; then
            echo "Failed to resolve image metadata."
            exit 1
          fi

          case "${IMAGE_DIGEST}" in
            ${REGISTRY}/${IMAGE_NAME}@sha256:*)
              echo "Image digest format OK."
              ;;
            *)
              echo "Invalid image digest format."
              echo "IMAGE_DIGEST=${IMAGE_DIGEST}"
              exit 1
              ;;
          esac

          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_DIGEST_VALUE=${IMAGE_DIGEST_VALUE}" >> "$GITHUB_ENV"
          echo "IMAGE_DIGEST=${IMAGE_DIGEST}" >> "$GITHUB_ENV"

          echo "Resolved staging image:"
          echo "${IMAGE_DIGEST}"

      - name: Update GitOps Staging Digest
        env:
          GITOPS_REPO_TOKEN: ${{ secrets.GITOPS_REPO_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GITOPS_REPO_TOKEN:-}" ]; then
            echo "GITOPS_REPO_TOKEN is empty."
            exit 1
          fi

          GITOPS_DIR="$RUNNER_TEMP/gitops"

          echo "Cloning GitOps repo..."
          git clone \
            --branch "${GITOPS_REPO_BRANCH}" \
            "https://x-access-token:${GITOPS_REPO_TOKEN}@github.com/Julie08080808/youtube-music-bot-gitops.git" \
            "${GITOPS_DIR}"

          cd "${GITOPS_DIR}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          KUSTOMIZATION="${GITOPS_STAGING_PATH}/kustomization.yaml"

          if [ ! -f "${KUSTOMIZATION}" ]; then
            echo "Kustomization file not found: ${KUSTOMIZATION}"
            exit 1
          fi

          echo "Before update:"
          cat "${KUSTOMIZATION}"

          GITOPS_KUSTOMIZATION="${KUSTOMIZATION}" python3 - << 'PY'
          import os
          import re
          from pathlib import Path

          path = Path(os.environ["GITOPS_KUSTOMIZATION"])
          digest = os.environ["IMAGE_DIGEST_VALUE"]

          text = path.read_text()

          new_text, count = re.subn(
              r'(^\s*digest:\s*).+$',
              r'\1' + digest,
              text,
              count=1,
              flags=re.MULTILINE,
          )

          if count != 1:
              raise SystemExit("Failed to update digest line in kustomization.yaml")

          path.write_text(new_text)
          PY

          echo "After update:"
          cat "${KUSTOMIZATION}"

          git status --short

          if git diff --quiet; then
            echo "GitOps staging digest already up to date."
            exit 0
          fi

          git add "${KUSTOMIZATION}"
          git commit -m "gitops: promote ${SHORT_SHA} to staging"
          git push origin "${GITOPS_REPO_BRANCH}"

          echo "GitOps staging digest updated."

      - name: Wait for Argo CD Staging Sync
        run: |
          set -euo pipefail

          echo "Requesting Argo CD hard refresh..."

          kubectl annotate application "${ARGOCD_STAGING_APP}" \
            -n "${ARGOCD_NAMESPACE}" \
            argocd.argoproj.io/refresh=hard \
            --overwrite

          echo "Waiting for Argo CD app to become Synced and Healthy..."

          for i in $(seq 1 90); do
            SYNC_STATUS="$(kubectl get application "${ARGOCD_STAGING_APP}" \
              -n "${ARGOCD_NAMESPACE}" \
              -o jsonpath='{.status.sync.status}' 2>/dev/null || true)"

            HEALTH_STATUS="$(kubectl get application "${ARGOCD_STAGING_APP}" \
              -n "${ARGOCD_NAMESPACE}" \
              -o jsonpath='{.status.health.status}' 2>/dev/null || true)"

            echo "Attempt ${i}: sync=${SYNC_STATUS:-unknown}, health=${HEALTH_STATUS:-unknown}"

            if [ "${SYNC_STATUS}" = "Synced" ] && [ "${HEALTH_STATUS}" = "Healthy" ]; then
              echo "Argo CD staging app is Synced and Healthy."
              break
            fi

            sleep 5
          done

          SYNC_STATUS="$(kubectl get application "${ARGOCD_STAGING_APP}" \
            -n "${ARGOCD_NAMESPACE}" \
            -o jsonpath='{.status.sync.status}')"

          HEALTH_STATUS="$(kubectl get application "${ARGOCD_STAGING_APP}" \
            -n "${ARGOCD_NAMESPACE}" \
            -o jsonpath='{.status.health.status}')"

          if [ "${SYNC_STATUS}" != "Synced" ] || [ "${HEALTH_STATUS}" != "Healthy" ]; then
            echo "Argo CD staging app did not become Synced and Healthy."
            kubectl describe application "${ARGOCD_STAGING_APP}" -n "${ARGOCD_NAMESPACE}"
            exit 1
          fi

      - name: Verify Staging Deployment
        run: |
          set -euo pipefail

          echo "Waiting for staging rollout..."
          kubectl rollout status deployment/${APP_NAME} \
            -n "${STAGING_NAMESPACE}" \
            --timeout=180s

          LIVE_IMAGE="$(kubectl get deployment "${APP_NAME}" \
            -n "${STAGING_NAMESPACE}" \
            -o jsonpath='{.spec.template.spec.containers[0].image}')"

          echo "Expected image: ${IMAGE_DIGEST}"
          echo "Live image:     ${LIVE_IMAGE}"

          if [ "${LIVE_IMAGE}" != "${IMAGE_DIGEST}" ]; then
            echo "Staging live image does not match expected image."
            exit 1
          fi

          POD_NODE="$(kubectl get pod -n "${STAGING_NAMESPACE}" \
            -l app="${APP_NAME}" \
            -o jsonpath='{.items[0].spec.nodeName}')"

          echo "Staging pod node: ${POD_NODE}"

          if [ "${POD_NODE}" != "node3" ]; then
            echo "Staging pod is not running on node3."
            exit 1
          fi

          kubectl get pods -n "${STAGING_NAMESPACE}" -o wide
          kubectl get svc -n "${STAGING_NAMESPACE}"

      - name: Smoke Test Staging
        run: |
          set -euo pipefail

          STAGING_CLUSTER_URL="http://${APP_NAME}.${STAGING_NAMESPACE}.svc.cluster.local:${APP_PORT}"

          echo "Testing staging service inside cluster:"
          echo "${STAGING_CLUSTER_URL}"

          for i in $(seq 1 30); do
            if curl -fsS "${STAGING_CLUSTER_URL}" > /tmp/staging-response.html; then
              echo "Staging cluster smoke test passed."
              head -20 /tmp/staging-response.html || true
              exit 0
            fi

            echo "Waiting for staging service... ${i}"
            sleep 5
          done

          echo "Staging smoke test failed."
          kubectl get pods -n "${STAGING_NAMESPACE}" -o wide
          kubectl describe deployment "${APP_NAME}" -n "${STAGING_NAMESPACE}"
          exit 1

      - name: Run OWASP ZAP Staging DAST
        run: |
          set -euo pipefail

          ZAP_JOB="zap-staging-baseline"
          STAGING_DAST_TARGET_URL="http://${APP_NAME}.${STAGING_NAMESPACE}.svc.cluster.local:${APP_PORT}"

          echo "Running OWASP ZAP against staging:"
          echo "${STAGING_DAST_TARGET_URL}"
          echo "ZAP image: ${ZAP_IMAGE}"
          echo "STAGING_DAST_FAIL_ON_WARN=${STAGING_DAST_FAIL_ON_WARN}"

          kubectl delete job "${ZAP_JOB}" \
            -n "${STAGING_NAMESPACE}" \
            --ignore-not-found \
            --wait=false || true

          cat << EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${ZAP_JOB}
            namespace: ${STAGING_NAMESPACE}
          spec:
            backoffLimit: 0
            template:
              spec:
                restartPolicy: Never
                imagePullSecrets:
                  - name: harbor-registry-secret
                containers:
                  - name: zap
                    image: ${ZAP_IMAGE}
                    command:
                      - /bin/sh
                      - -c
                    args:
                      - |
                        set +e
                        cd /zap/wrk

                        zap-baseline.py \
                          -t "${STAGING_DAST_TARGET_URL}" \
                          -J zap-staging-report.json \
                          -r zap-staging-report.html \
                          -w zap-staging-report.md

                        ZAP_STATUS=\$?
                        echo "\${ZAP_STATUS}" > /zap/wrk/zap-staging-exit-code.txt
                        echo "ZAP staging scan finished with exit code: \${ZAP_STATUS}"
                        echo "Keeping container alive for artifact copy..."
                        sleep 300
                        exit 0
                    volumeMounts:
                      - name: zap-work
                        mountPath: /zap/wrk
                volumes:
                  - name: zap-work
                    emptyDir: {}
          EOF

          trap 'kubectl delete job "${ZAP_JOB}" -n "${STAGING_NAMESPACE}" --ignore-not-found --wait=false >/dev/null 2>&1 || true' EXIT

          echo "Waiting for ZAP pod..."

          ZAP_POD=""
          for i in $(seq 1 60); do
            ZAP_POD="$(kubectl get pod -n "${STAGING_NAMESPACE}" \
              -l job-name="${ZAP_JOB}" \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"

            if [ -n "${ZAP_POD}" ]; then
              PHASE="$(kubectl get pod -n "${STAGING_NAMESPACE}" "${ZAP_POD}" -o jsonpath='{.status.phase}' || true)"
              echo "ZAP pod phase: ${PHASE}"

              if [ "${PHASE}" = "Running" ]; then
                break
              fi
            fi

            sleep 5
          done

          if [ -z "${ZAP_POD}" ]; then
            echo "Failed to find ZAP pod."
            kubectl get pods -n "${STAGING_NAMESPACE}" -o wide
            exit 1
          fi

          echo "ZAP pod: ${ZAP_POD}"

          echo "Waiting for ZAP scan output files..."

          SCAN_DONE="false"
          for i in $(seq 1 120); do
            if kubectl exec -n "${STAGING_NAMESPACE}" "${ZAP_POD}" -- test -f /zap/wrk/zap-staging-exit-code.txt; then
              echo "ZAP staging scan completed."
              SCAN_DONE="true"
              break
            fi

            echo "ZAP staging scan still running... ${i}"
            sleep 5
          done

          if [ "${SCAN_DONE}" != "true" ]; then
            echo "ZAP staging scan did not finish in time."
            kubectl logs -n "${STAGING_NAMESPACE}" "${ZAP_POD}" || true
            exit 1
          fi

          kubectl logs -n "${STAGING_NAMESPACE}" "${ZAP_POD}" | tee zap-staging-console.log

          kubectl cp \
            "${STAGING_NAMESPACE}/${ZAP_POD}:/zap/wrk/zap-staging-report.json" \
            "zap-staging-report-${SHORT_SHA}.json" || true

          kubectl cp \
            "${STAGING_NAMESPACE}/${ZAP_POD}:/zap/wrk/zap-staging-report.html" \
            "zap-staging-report-${SHORT_SHA}.html" || true

          kubectl cp \
            "${STAGING_NAMESPACE}/${ZAP_POD}:/zap/wrk/zap-staging-report.md" \
            "zap-staging-report-${SHORT_SHA}.md" || true

          kubectl cp \
            "${STAGING_NAMESPACE}/${ZAP_POD}:/zap/wrk/zap-staging-exit-code.txt" \
            "zap-staging-exit-code-${SHORT_SHA}.txt" || true

          ls -lh zap-staging-* || true

          FAIL_NEW="$( (grep -Eo 'FAIL-NEW: [0-9]+' zap-staging-console.log || true) | tail -1 | awk '{print $2}' )"
          WARN_NEW="$( (grep -Eo 'WARN-NEW: [0-9]+' zap-staging-console.log || true) | tail -1 | awk '{print $2}' )"

          FAIL_NEW="${FAIL_NEW:-0}"
          WARN_NEW="${WARN_NEW:-0}"

          echo "ZAP staging FAIL-NEW=${FAIL_NEW}"
          echo "ZAP staging WARN-NEW=${WARN_NEW}"

          if ! grep -q 'FAIL-NEW:' zap-staging-console.log; then
            echo "ZAP summary was not found in console log."
            echo "Treating staging DAST as failed."
            exit 1
          fi

          if [ "${FAIL_NEW}" != "0" ]; then
            echo "OWASP ZAP staging scan found FAIL issues."
            echo "Staging DAST gate failed. Production will not be triggered."
            exit 1
          fi

          if [ "${WARN_NEW}" != "0" ]; then
            echo "OWASP ZAP staging scan found WARN issues."
            echo "STAGING_DAST_FAIL_ON_WARN=${STAGING_DAST_FAIL_ON_WARN}"

            if [ "${STAGING_DAST_FAIL_ON_WARN}" = "true" ]; then
              echo "Staging DAST gate failed because WARN-NEW must be 0."
              echo "Production will not be triggered."
              exit 1
            fi

            echo "WARN issues are currently non-blocking."
          fi

          echo "OWASP ZAP staging DAST passed."

      - name: Upload Staging DAST Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-dast-artifacts
          path: |
            zap-staging-console.log
            zap-staging-report-*.json
            zap-staging-report-*.html
            zap-staging-report-*.md
            zap-staging-exit-code-*.txt
          if-no-files-found: warn

      - name: Write Staging Summary
        if: always()
        run: |
          echo "## GitOps CD Staging Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Namespace | \`${STAGING_NAMESPACE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| App | \`${APP_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image Digest | \`${IMAGE_DIGEST:-not-resolved}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Argo CD App | \`${ARGOCD_STAGING_APP}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitOps Path | \`${GITOPS_STAGING_PATH}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Node Selector | \`dedicated=production-storage\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Expected Node | \`node3\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster URL | \`http://${APP_NAME}.${STAGING_NAMESPACE}.svc.cluster.local:${APP_PORT}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| NodePort | \`${STAGING_NODE_PORT}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Staging DAST | \`OWASP ZAP baseline\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Staging DAST Fail on WARN | \`${STAGING_DAST_FAIL_ON_WARN}\` |" >> "$GITHUB_STEP_SUMMARY"
