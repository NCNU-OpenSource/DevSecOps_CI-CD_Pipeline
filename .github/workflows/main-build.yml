name: Main Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: main-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: 10.32.20.51:30443

  IMAGE_NAME: ci/youtube-music-bot
  BUILDKIT_HOST: tcp://buildkitd.ci-build.svc.cluster.local:1234

jobs:
  build-and-push:
    name: Main Build / Build and Push Image
    runs-on: arc-runner-set
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Runner and BuildKit Info
        run: |
          set -o pipefail

          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "SHA: $GITHUB_SHA"

          echo "Checking buildctl..."
          buildctl --version

          echo "Checking BuildKit workers..."
          buildctl --addr "${BUILDKIT_HOST}" debug workers

          echo "Disk:"
          df -h

          echo "Memory:"
          free -h || true

      - name: Prepare Image Tags
        run: |
          set -o pipefail

          SHORT_SHA="${GITHUB_SHA::7}"

          IMAGE_SHA="${REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}"
          IMAGE_LATEST="${REGISTRY}/${IMAGE_NAME}:latest"

          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_SHA=${IMAGE_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=${IMAGE_LATEST}" >> "$GITHUB_ENV"

          echo "Image SHA tag: ${IMAGE_SHA}"
          echo "Image latest tag: ${IMAGE_LATEST}"

      - name: Configure Harbor Auth
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -o pipefail

          if [ -z "$HARBOR_USERNAME" ] || [ -z "$HARBOR_PASSWORD" ]; then
            echo "HARBOR_USERNAME or HARBOR_PASSWORD is empty."
            exit 1
          fi

          mkdir -p "$HOME/.docker"

          AUTH="$(printf "%s:%s" "$HARBOR_USERNAME" "$HARBOR_PASSWORD" | base64 -w0)"

          cat > "$HOME/.docker/config.json" << EOF
          {
            "auths": {
              "${REGISTRY}": {
                "auth": "${AUTH}"
              }
            }
          }
          EOF

          echo "DOCKER_CONFIG=$HOME/.docker" >> "$GITHUB_ENV"
          echo "Harbor auth configured for ${REGISTRY}."

      - name: Configure Harbor CA for buildctl client
        env:
          HARBOR_CA_CRT: ${{ secrets.HARBOR_CA_CRT }}
        run: |
          set -o pipefail

          if [ -z "$HARBOR_CA_CRT" ]; then
            echo "HARBOR_CA_CRT is empty or not configured."
            echo "Skip client-side CA setup."
            exit 0
          fi

          mkdir -p "$RUNNER_TEMP/certs"
          printf "%s\n" "$HARBOR_CA_CRT" > "$RUNNER_TEMP/certs/harbor-ca.crt"

          echo "SSL_CERT_FILE=$RUNNER_TEMP/certs/harbor-ca.crt" >> "$GITHUB_ENV"

          echo "Harbor CA configured for buildctl client."
          grep "BEGIN CERTIFICATE" "$RUNNER_TEMP/certs/harbor-ca.crt"

      - name: Verify Harbor Auth Registry Key
        run: |
          set -o pipefail

          echo "REGISTRY=${REGISTRY}"
          echo "IMAGE_SHA=${IMAGE_SHA}"
          echo "IMAGE_LATEST=${IMAGE_LATEST}"
          echo "DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}"

          echo "Docker config auth keys:"
          jq -r '.auths | keys[]' "$HOME/.docker/config.json"

          AUTH_KEY="$(jq -r '.auths | keys[0]' "$HOME/.docker/config.json")"

          if [ "$AUTH_KEY" != "$REGISTRY" ]; then
            echo "Registry key mismatch!"
            echo "REGISTRY=${REGISTRY}"
            echo "AUTH_KEY=${AUTH_KEY}"
            exit 1
          fi

          case "$IMAGE_SHA" in
            ${REGISTRY}/*)
              echo "IMAGE_SHA registry matches REGISTRY."
              ;;
            *)
              echo "IMAGE_SHA does not start with REGISTRY."
              echo "REGISTRY=${REGISTRY}"
              echo "IMAGE_SHA=${IMAGE_SHA}"
              exit 1
              ;;
          esac

          echo "Harbor auth registry key is consistent."

      - name: Test Harbor Frontend Auth
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -o pipefail

          echo "Testing Harbor /v2/ auth..."
          STATUS="$(curl -sk -o /tmp/harbor-v2.txt -w "%{http_code}" \
            -u "${HARBOR_USERNAME}:${HARBOR_PASSWORD}" \
            "https://${REGISTRY}/v2/")"

          echo "Harbor /v2/ status: ${STATUS}"
          sed -n '1,20p' /tmp/harbor-v2.txt || true

          if [ "$STATUS" != "200" ]; then
            echo "Harbor basic auth failed or robot account is invalid."
            exit 1
          fi

          echo "Testing Harbor token for push scope..."
          TOKEN_STATUS="$(curl -sk -o /tmp/harbor-token.json -w "%{http_code}" \
            -u "${HARBOR_USERNAME}:${HARBOR_PASSWORD}" \
            "https://${REGISTRY}/service/token?service=harbor-registry&scope=repository:${IMAGE_NAME}:pull,push")"

          echo "Harbor token status: ${TOKEN_STATUS}"

          if [ "$TOKEN_STATUS" != "200" ]; then
            echo "Failed to get Harbor token for pull,push scope."
            cat /tmp/harbor-token.json
            exit 1
          fi

          if jq -e 'has("token") or has("access_token")' /tmp/harbor-token.json >/dev/null; then
            echo "Harbor token for pull,push scope acquired."
          else
            echo "Harbor token response does not contain token."
            jq 'keys' /tmp/harbor-token.json
            exit 1
          fi

      - name: Check Dockerfile
        run: |
          set -o pipefail

          test -f Dockerfile
          echo "Dockerfile found."

      - name: Build and Push Image with BuildKit
        run: |
          set -o pipefail

          echo "BUILDKIT_HOST=${BUILDKIT_HOST}"
          echo "REGISTRY=${REGISTRY}"
          echo "IMAGE_SHA=${IMAGE_SHA}"
          echo "IMAGE_LATEST=${IMAGE_LATEST}"
          echo "DOCKER_CONFIG=${DOCKER_CONFIG}"
          echo "SSL_CERT_FILE=${SSL_CERT_FILE:-not-set}"

          buildctl --addr "${BUILDKIT_HOST}" build \
            --progress=plain \
            --frontend dockerfile.v0 \
            --local context=. \
            --local dockerfile=. \
            --opt filename=Dockerfile \
            --output type=image,name="${IMAGE_SHA}",push=true

      - name: Write Build Summary
        if: always()
        run: |
          echo "## Main Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | \`${REGISTRY}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image SHA | \`${IMAGE_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image Latest | \`${IMAGE_LATEST}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| BuildKit Host | \`${BUILDKIT_HOST}\` |" >> "$GITHUB_STEP_SUMMARY"
