name: Main Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: main-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: 10.32.20.51:30443
  IMAGE_NAME: ci/youtube-music-bot
  BUILDKIT_HOST: tcp://buildkitd.ci-build.svc.cluster.local:1234

jobs:
  build-and-push:
    name: Main Build / Build and Push Image
    runs-on: arc-runner-set
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Runner and BuildKit Info
        run: |
          set -euo pipefail

          echo "Runner name: ${RUNNER_NAME}"
          echo "Runner OS: ${RUNNER_OS}"
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Ref: ${GITHUB_REF}"
          echo "SHA: ${GITHUB_SHA}"

          echo "Checking buildctl..."
          buildctl --version

          echo "Checking BuildKit workers..."
          buildctl --addr "${BUILDKIT_HOST}" debug workers

          echo "Disk:"
          df -h

          echo "Memory:"
          free -h || true

      - name: Prepare Image Metadata
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_SHA="${REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}"

          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_SHA=${IMAGE_SHA}" >> "$GITHUB_ENV"

          cat > image-metadata.txt << EOF
          REGISTRY=${REGISTRY}
          IMAGE_NAME=${IMAGE_NAME}
          IMAGE_SHA=${IMAGE_SHA}
          SHORT_SHA=${SHORT_SHA}
          GITHUB_SHA=${GITHUB_SHA}
          GITHUB_REF=${GITHUB_REF}
          BUILDKIT_HOST=${BUILDKIT_HOST}
          EOF

          echo "Image tag: ${IMAGE_SHA}"

      - name: Configure Harbor Auth
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${HARBOR_USERNAME:-}" ] || [ -z "${HARBOR_PASSWORD:-}" ]; then
            echo "HARBOR_USERNAME or HARBOR_PASSWORD is empty."
            exit 1
          fi

          mkdir -p "$HOME/.docker"

          AUTH="$(printf "%s:%s" "$HARBOR_USERNAME" "$HARBOR_PASSWORD" | base64 -w0)"

          cat > "$HOME/.docker/config.json" << EOF
          {
            "auths": {
              "${REGISTRY}": {
                "auth": "${AUTH}"
              }
            }
          }
          EOF

          echo "DOCKER_CONFIG=$HOME/.docker" >> "$GITHUB_ENV"
          echo "Harbor auth configured for ${REGISTRY}."

      - name: Configure Harbor CA for buildctl and Syft
        env:
          HARBOR_CA_CRT: ${{ secrets.HARBOR_CA_CRT }}
        run: |
          set -euo pipefail

          if [ -z "${HARBOR_CA_CRT:-}" ]; then
            echo "HARBOR_CA_CRT is empty or not configured."
            echo "Skipping client-side CA setup because BuildKit image already contains Harbor CA."
            exit 0
          fi

          mkdir -p "$RUNNER_TEMP/certs"
          printf "%s\n" "$HARBOR_CA_CRT" > "$RUNNER_TEMP/certs/harbor-ca.crt"

          echo "SSL_CERT_FILE=$RUNNER_TEMP/certs/harbor-ca.crt" >> "$GITHUB_ENV"

          echo "Harbor CA configured for buildctl and Syft client."
          grep "BEGIN CERTIFICATE" "$RUNNER_TEMP/certs/harbor-ca.crt"

      - name: Verify Harbor Auth Registry Key
        run: |
          set -euo pipefail

          echo "REGISTRY=${REGISTRY}"
          echo "IMAGE_SHA=${IMAGE_SHA}"
          echo "DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}"

          echo "Docker config auth keys:"
          jq -r '.auths | keys[]' "$HOME/.docker/config.json"

          AUTH_KEY="$(jq -r '.auths | keys[0]' "$HOME/.docker/config.json")"

          if [ "$AUTH_KEY" != "$REGISTRY" ]; then
            echo "Registry key mismatch."
            echo "REGISTRY=${REGISTRY}"
            echo "AUTH_KEY=${AUTH_KEY}"
            exit 1
          fi

          case "$IMAGE_SHA" in
            ${REGISTRY}/*)
              echo "IMAGE_SHA registry matches REGISTRY."
              ;;
            *)
              echo "IMAGE_SHA does not start with REGISTRY."
              echo "REGISTRY=${REGISTRY}"
              echo "IMAGE_SHA=${IMAGE_SHA}"
              exit 1
              ;;
          esac

          echo "Harbor auth registry key is consistent."

      - name: Test Harbor Frontend Auth
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -euo pipefail

          echo "Testing Harbor /v2/ auth..."
          STATUS="$(curl -sk -o /tmp/harbor-v2.txt -w "%{http_code}" \
            -u "${HARBOR_USERNAME}:${HARBOR_PASSWORD}" \
            "https://${REGISTRY}/v2/")"

          echo "Harbor /v2/ status: ${STATUS}"
          sed -n '1,20p' /tmp/harbor-v2.txt || true

          if [ "$STATUS" != "200" ]; then
            echo "Harbor basic auth failed or robot account is invalid."
            exit 1
          fi

          echo "Testing Harbor token for pull,push scope..."
          TOKEN_STATUS="$(curl -sk -o /tmp/harbor-token.json -w "%{http_code}" \
            -u "${HARBOR_USERNAME}:${HARBOR_PASSWORD}" \
            "https://${REGISTRY}/service/token?service=harbor-registry&scope=repository:${IMAGE_NAME}:pull,push")"

          echo "Harbor token status: ${TOKEN_STATUS}"

          if [ "$TOKEN_STATUS" != "200" ]; then
            echo "Failed to get Harbor token for pull,push scope."
            cat /tmp/harbor-token.json
            exit 1
          fi

          if jq -e 'has("token") or has("access_token")' /tmp/harbor-token.json >/dev/null; then
            echo "Harbor token for pull,push scope acquired."
          else
            echo "Harbor token response does not contain token."
            jq 'keys' /tmp/harbor-token.json
            exit 1
          fi

      - name: Check Dockerfile
        run: |
          set -euo pipefail

          test -f Dockerfile
          echo "Dockerfile found."

      - name: Build and Push Image with BuildKit
        run: |
          set -euo pipefail

          echo "BUILDKIT_HOST=${BUILDKIT_HOST}"
          echo "REGISTRY=${REGISTRY}"
          echo "IMAGE_SHA=${IMAGE_SHA}"
          echo "DOCKER_CONFIG=${DOCKER_CONFIG}"
          echo "SSL_CERT_FILE=${SSL_CERT_FILE:-not-set}"

          buildctl --addr "${BUILDKIT_HOST}" build \
            --progress=plain \
            --frontend dockerfile.v0 \
            --local context=. \
            --local dockerfile=. \
            --opt filename=Dockerfile \
            --output type=image,name="${IMAGE_SHA}",push=true

      - name: Install Syft
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/bin"

          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin"

          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

          "$RUNNER_TEMP/bin/syft" version

      - name: Export Image OCI Archive with BuildKit
        run: |
          set -euo pipefail

          IMAGE_OCI_TAR="image-${SHORT_SHA}.oci.tar"

          echo "Exporting OCI archive for SBOM scan:"
          echo "${IMAGE_OCI_TAR}"

          buildctl --addr "${BUILDKIT_HOST}" build \
            --progress=plain \
            --frontend dockerfile.v0 \
            --local context=. \
            --local dockerfile=. \
            --opt filename=Dockerfile \
            --output type=oci,dest="${IMAGE_OCI_TAR}"

          echo "IMAGE_OCI_TAR=${IMAGE_OCI_TAR}" >> "$GITHUB_ENV"

          echo "OCI archive exported:"
          ls -lh "${IMAGE_OCI_TAR}"

      - name: Generate Image SBOM
        run: |
          set -euo pipefail

          SBOM_FILE="sbom-${SHORT_SHA}.spdx.json"

          echo "Generating SBOM from OCI archive:"
          echo "${IMAGE_OCI_TAR}"

          syft "oci-archive:${IMAGE_OCI_TAR}" \
            -o spdx-json="${SBOM_FILE}"

          echo "SBOM_FILE=${SBOM_FILE}" >> "$GITHUB_ENV"

          echo "SBOM generated: ${SBOM_FILE}"
          ls -lh "${SBOM_FILE}"

      - name: Install Grype
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/bin"

          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin"

          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

          "$RUNNER_TEMP/bin/grype" version

      - name: Scan SBOM with Grype
        continue-on-error: true
        run: |
          set -euo pipefail

          GRYPE_JSON="grype-${SHORT_SHA}.json"
          GRYPE_TABLE="grype-${SHORT_SHA}.txt"

          echo "Scanning SBOM:"
          echo "${SBOM_FILE}"

          grype "sbom:${SBOM_FILE}" \
            -o json > "${GRYPE_JSON}"

          grype "sbom:${SBOM_FILE}" \
            -o table > "${GRYPE_TABLE}"

          echo "GRYPE_JSON=${GRYPE_JSON}" >> "$GITHUB_ENV"
          echo "GRYPE_TABLE=${GRYPE_TABLE}" >> "$GITHUB_ENV"

          echo "Grype reports generated:"
          ls -lh "${GRYPE_JSON}" "${GRYPE_TABLE}"

      - name: Install Cosign
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/bin"

          COSIGN_VERSION="v2.4.1"

          curl -sSfL \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o "$RUNNER_TEMP/bin/cosign"

          chmod +x "$RUNNER_TEMP/bin/cosign"

          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

          "$RUNNER_TEMP/bin/cosign" version

      - name: Configure Cosign Key
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${COSIGN_PRIVATE_KEY:-}" ]; then
            echo "COSIGN_PRIVATE_KEY is empty."
            exit 1
          fi

          printf "%s\n" "$COSIGN_PRIVATE_KEY" > "$RUNNER_TEMP/cosign.key"

          chmod 600 "$RUNNER_TEMP/cosign.key"

          echo "COSIGN_KEY_PATH=$RUNNER_TEMP/cosign.key" >> "$GITHUB_ENV"

      - name: Configure Cosign Public Key
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${COSIGN_PUBLIC_KEY:-}" ]; then
            echo "COSIGN_PUBLIC_KEY is empty."
            exit 1
          fi

          printf "%s\n" "$COSIGN_PUBLIC_KEY" > "$RUNNER_TEMP/cosign.pub"
          chmod 644 "$RUNNER_TEMP/cosign.pub"

          echo "COSIGN_PUBLIC_KEY_PATH=$RUNNER_TEMP/cosign.pub" >> "$GITHUB_ENV"

          echo "Cosign public key configured."
          grep "BEGIN PUBLIC KEY" "$RUNNER_TEMP/cosign.pub"
      
      - name: Sign Image with Cosign
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${COSIGN_PASSWORD:-}" ]; then
            echo "COSIGN_PASSWORD is empty."
            exit 1
          fi

          echo "Signing image:"
          echo "${IMAGE_SHA}"

          cosign sign \
            --yes \
            --key "${COSIGN_KEY_PATH}" \
            "${IMAGE_SHA}"

          echo "Image signed successfully."

      - name: Verify Image Signature
        run: |
          set -euo pipefail

          echo "Verifying image signature:"
          echo "${IMAGE_SHA}"

          cosign verify \
            --key "${COSIGN_PUBLIC_KEY_PATH}" \
            "${IMAGE_SHA}"

          echo "Image signature verified successfully."
          
      - name: Upload Main Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-build-artifacts
          path: |
            image-metadata.txt
            sbom-*.spdx.json
            grype-*.json
            grype-*.txt
          if-no-files-found: warn

      - name: Write Build Summary
        if: always()
        run: |
          echo "## Main Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | \`${REGISTRY}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${IMAGE_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Short SHA | \`${SHORT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| BuildKit Host | \`${BUILDKIT_HOST}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SBOM | \`${SBOM_FILE:-not-generated}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Grype JSON | \`${GRYPE_JSON:-not-generated}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Grype Table | \`${GRYPE_TABLE:-not-generated}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cosign | \`signed\` |" >> "$GITHUB_STEP_SUMMARY"
