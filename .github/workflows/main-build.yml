name: Main Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: main-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: harbor-registry.harbor.svc.cluster.local:5000
  EXTERNAL_REGISTRY: 10.32.20.51:30443

  IMAGE_NAME: ci/youtube-music-bot
  BUILDKIT_HOST: tcp://buildkitd.ci-build.svc.cluster.local:1234

jobs:
  build-and-push:
    name: Main Build / Build and Push Image
    runs-on: arc-runner-set
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Runner and BuildKit Info
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "SHA: $GITHUB_SHA"

          echo "Checking buildctl..."
          buildctl --version

          echo "Checking BuildKit workers..."
          buildctl --addr "${BUILDKIT_HOST}" debug workers

          echo "Disk:"
          df -h

          echo "Memory:"
          free -h || true

      - name: Prepare Image Tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          IMAGE_SHA="${REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}"
          IMAGE_EXTERNAL="${EXTERNAL_REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}"

          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_SHA=${IMAGE_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_EXTERNAL=${IMAGE_EXTERNAL}" >> "$GITHUB_ENV"

          echo "Internal push image: ${IMAGE_SHA}"
          echo "External pull image: ${IMAGE_EXTERNAL}"

      - name: Configure Harbor Auth
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -o pipefail

          if [ -z "$HARBOR_USERNAME" ] || [ -z "$HARBOR_PASSWORD" ]; then
            echo "HARBOR_USERNAME or HARBOR_PASSWORD is empty."
            exit 1
          fi

          mkdir -p "$HOME/.docker"

          AUTH="$(printf "%s:%s" "$HARBOR_USERNAME" "$HARBOR_PASSWORD" | base64 -w0)"

          cat > "$HOME/.docker/config.json" << EOF
          {
            "auths": {
              "${REGISTRY}": {
                "auth": "${AUTH}"
              }
            }
          }
          EOF

          echo "DOCKER_CONFIG=$HOME/.docker" >> "$GITHUB_ENV"
          echo "Harbor auth configured for ${REGISTRY}."

      - name: Verify Harbor Auth Registry Key
        run: |
          set -o pipefail

          echo "REGISTRY=${REGISTRY}"
          echo "IMAGE_SHA=${IMAGE_SHA}"
          echo "IMAGE_EXTERNAL=${IMAGE_EXTERNAL}"
          echo "DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}"

          echo "Docker config auth keys:"
          jq -r '.auths | keys[]' "$HOME/.docker/config.json"

          AUTH_KEY="$(jq -r '.auths | keys[0]' "$HOME/.docker/config.json")"

          if [ "$AUTH_KEY" != "$REGISTRY" ]; then
            echo "Registry key mismatch!"
            echo "REGISTRY=${REGISTRY}"
            echo "AUTH_KEY=${AUTH_KEY}"
            exit 1
          fi

          case "$IMAGE_SHA" in
            ${REGISTRY}/*)
              echo "IMAGE_SHA registry matches REGISTRY."
              ;;
            *)
              echo "IMAGE_SHA does not start with REGISTRY."
              echo "REGISTRY=${REGISTRY}"
              echo "IMAGE_SHA=${IMAGE_SHA}"
              exit 1
              ;;
          esac

          echo "Harbor auth registry key is consistent."

      - name: Test Harbor Registry Auth
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -o pipefail

          echo "Testing direct registry backend auth..."
          curl -i -u "${HARBOR_USERNAME}:${HARBOR_PASSWORD}" \
            "http://${REGISTRY}/v2/" \
            | sed -n '1,40p'

      - name: Check Dockerfile
        run: |
          test -f Dockerfile
          echo "Dockerfile found."

      - name: Build and Push Image with BuildKit
        run: |
          set -o pipefail

          echo "BUILDKIT_HOST=${BUILDKIT_HOST}"
          echo "REGISTRY=${REGISTRY}"
          echo "IMAGE_SHA=${IMAGE_SHA}"
          echo "IMAGE_EXTERNAL=${IMAGE_EXTERNAL}"
          echo "DOCKER_CONFIG=${DOCKER_CONFIG}"

          buildctl --addr "${BUILDKIT_HOST}" build \
            --progress=plain \
            --frontend dockerfile.v0 \
            --local context=. \
            --local dockerfile=. \
            --opt filename=Dockerfile \
            --output type=image,name="${IMAGE_SHA}",push=true,registry.insecure=true

      - name: Write Build Summary
        if: always()
        run: |
          echo "## Main Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Internal Push Registry | \`${REGISTRY}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| External Pull Registry | \`${EXTERNAL_REGISTRY}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Internal Image | \`${IMAGE_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| External Pull Image | \`${IMAGE_EXTERNAL}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| BuildKit Host | \`${BUILDKIT_HOST}\` |" >> "$GITHUB_STEP_SUMMARY"
