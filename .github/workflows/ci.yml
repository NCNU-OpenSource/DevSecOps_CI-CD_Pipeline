name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  ENFORCE_CI_GATE: "true"

jobs:
  static-analysis:
    name: CI / Static Analysis
    runs-on: arc-runner-set
    timeout-minutes: 20

    outputs:
      biome: ${{ steps.static-results.outputs.biome }}
      tsc: ${{ steps.static-results.outputs.tsc }}
      semgrep: ${{ steps.static-results.outputs.semgrep }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Runner Info
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "CPU:"
          nproc
          echo "Disk:"
          df -h
          echo "Memory:"
          free -h || true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: |
          bun install --frozen-lockfile

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Run Biome CI
        id: biome
        continue-on-error: true
        run: |
          set -o pipefail
          biome ci --reporter=github . 2>&1 | tee biome-report.txt

      - name: Run TypeScript Check
        id: tsc
        continue-on-error: true
        run: |
          set -o pipefail

          if [ -f tsconfig.json ]; then
            bunx tsc --noEmit 2>&1 | tee tsc-report.txt
          else
            echo "No tsconfig.json found. Skip TypeScript check." | tee tsc-report.txt
          fi

      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        run: |
          set -o pipefail

          echo "Creating Semgrep virtual environment..."
          python3 -m venv .semgrep-venv

          echo "Activating Semgrep virtual environment..."
          source .semgrep-venv/bin/activate

          echo "Installing Semgrep..."
          python -m pip install --upgrade pip
          python -m pip install semgrep

          echo "Semgrep version:"
          semgrep --version

          echo "Running Semgrep scan..."

          set +e
          timeout 180 semgrep scan \
            --config p/javascript \
            --config p/typescript \
            --config p/dockerfile \
            --metrics off \
            --exclude .semgrep-venv \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --json \
            --output semgrep-report.json \
            src Dockerfile 2>&1 | tee semgrep-console.txt
          SEMGREP_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "Semgrep exit code: ${SEMGREP_EXIT_CODE}" | tee semgrep-status.txt

          if [ "${SEMGREP_EXIT_CODE}" -eq 124 ]; then
            echo "status=timeout" >> "$GITHUB_OUTPUT"
            echo "Semgrep timed out." | tee -a semgrep-status.txt
            exit 0
          fi

          if [ ! -s semgrep-report.json ]; then
            echo "status=tool-error" >> "$GITHUB_OUTPUT"
            echo "Semgrep did not produce semgrep-report.json. This is likely an environment or tool error." | tee -a semgrep-status.txt
            exit 0
          fi

          FINDINGS=$(jq '.results | length' semgrep-report.json)

          echo "Semgrep findings: ${FINDINGS}" | tee -a semgrep-status.txt

          if [ "${FINDINGS}" -gt 0 ]; then
            echo "status=finding" >> "$GITHUB_OUTPUT"
            echo "Semgrep scan completed and found security findings." | tee -a semgrep-status.txt
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "Semgrep scan completed with no findings." | tee -a semgrep-status.txt
          fi
          
      - name: Collect Static Analysis Results
        id: static-results
        if: always()
        run: |
          echo "biome=${{ steps.biome.outcome }}" >> "$GITHUB_OUTPUT"
          echo "tsc=${{ steps.tsc.outcome }}" >> "$GITHUB_OUTPUT"
          echo "semgrep=${{ steps.semgrep.outcome }}" >> "$GITHUB_OUTPUT"
          
      - name: Upload Static Analysis Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            biome-report.txt
            tsc-report.txt
            semgrep-report.json
            semgrep-console.txt
            semgrep-status.txt
          if-no-files-found: warn

  build-check:
    name: CI / Build Check
    runs-on: arc-runner-set
    timeout-minutes: 20

    outputs:
      build: ${{ steps.build-results.outputs.build }}
      hadolint: ${{ steps.build-results.outputs.hadolint }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Runner Info
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "CPU:"
          nproc
          echo "Disk:"
          df -h
          echo "Memory:"
          free -h || true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: |
          bun install --frozen-lockfile

      - name: Run Build Check
        id: build
        continue-on-error: true
        run: |
          set -o pipefail

          if [ -f package.json ] && node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)"; then
            bun run build 2>&1 | tee build-report.txt
          else
            echo "No build script found in package.json. Skip build check." | tee build-report.txt
          fi

      - name: Run Hadolint
        id: hadolint
        continue-on-error: true
        run: |
          set -o pipefail

          find . -name "Dockerfile*" -type f | sort > dockerfiles.txt

          if [ ! -s dockerfiles.txt ]; then
            echo "No Dockerfile found. Skip Hadolint." | tee hadolint-report.txt
            exit 0
          fi

          HADOLINT_VERSION="v2.12.0"
          curl -L -o /tmp/hadolint "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          chmod +x /tmp/hadolint

          status=0
          while read -r dockerfile; do
            echo "Checking ${dockerfile}" | tee -a hadolint-report.txt
            /tmp/hadolint "${dockerfile}" 2>&1 | tee -a hadolint-report.txt || status=1
          done < dockerfiles.txt

          exit "$status"

      - name: Collect Build Check Results
        id: build-results
        if: always()
        run: |
          echo "build=${{ steps.build.outcome }}" >> "$GITHUB_OUTPUT"
          echo "hadolint=${{ steps.hadolint.outcome }}" >> "$GITHUB_OUTPUT"

      - name: Upload Build Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-check-reports
          path: |
            build-report.txt
            hadolint-report.txt
            dockerfiles.txt
          if-no-files-found: warn

  ci-summary:
    name: CI / Summary
    runs-on: arc-runner-set
    needs:
      - static-analysis
      - build-check
    if: always()
    timeout-minutes: 5

    defaults:
      run:
        shell: bash

    steps:
      - name: Write CI Summary
        run: |
          echo "## CI Test Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Biome | ${{ needs.static-analysis.outputs.biome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| TypeScript | ${{ needs.static-analysis.outputs.tsc }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Semgrep | ${{ needs.static-analysis.outputs.semgrep }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ${{ needs.build-check.outputs.build }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Hadolint | ${{ needs.build-check.outputs.hadolint }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Mode: CI infrastructure validation mode." >> "$GITHUB_STEP_SUMMARY"
          echo "ENFORCE_CI_GATE=${ENFORCE_CI_GATE}" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce CI Gate
        if: env.ENFORCE_CI_GATE == 'true' && (needs.static-analysis.outputs.biome != 'success' || needs.static-analysis.outputs.tsc != 'success' || needs.static-analysis.outputs.semgrep != 'success' || needs.build-check.outputs.build != 'success' || needs.build-check.outputs.hadolint != 'success')
        run: |
          echo "One or more required CI checks failed."
          exit 1
