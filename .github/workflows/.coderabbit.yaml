language: zh-TW

tone_instructions: >
  請使用繁體中文回覆。評論要務實、精準、避免過度吹毛求疵。
  此專案重點是 DevSecOps / GitOps / Kubernetes / CI/CD 安全流程。
  請優先指出會影響安全性、部署正確性、權限控管、供應鏈安全或 production gate 的問題。
  CodeRabbit 在本專案中只作為輔助審查與建議，不作為阻擋 PR 的必要 gate。

reviews:
  profile: chill

  high_level_summary: true
  high_level_summary_in_walkthrough: true
  changed_files_summary: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  suggested_reviewers: false
  auto_assign_reviewers: false

  review_status: false
  collapse_walkthrough: true
  sequence_diagrams: false

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - main
    ignore_title_keywords:
      - WIP
      - draft

  path_filters:
    - "!dist/**"
    - "!build/**"
    - "!node_modules/**"
    - "!coverage/**"
    - "!*.lock"
    - "!bun.lockb"
    - ".github/workflows/**"
    - "Dockerfile"
    - "src/**"
    - "server/**"
    - "backend/**"
    - "frontend/**"
    - "k8s/**"
    - "terraform/**"

  path_instructions:
    - path: ".github/workflows/**"
      instructions: >
        這是 GitHub Actions CI/CD workflow。請特別檢查：
        1. 是否有 secrets 外洩或 echo；
        2. pull_request 是否會讓 fork PR 存取 secrets；
        3. permissions 是否過大；
        4. PR DAST、Staging DAST、Production approval 是否被繞過；
        5. GitOps promotion 是否仍由 staging digest 推進 production；
        6. 是否有不必要的外網下載或重複安裝工具。

    - path: "Dockerfile"
      instructions: >
        這是 production image build file。請特別檢查：
        1. base image 是否固定版本；
        2. 是否以 non-root 執行；
        3. 是否暴露 secret；
        4. 是否增加不必要套件；
        5. 是否會影響 security headers、CSP 或 static asset serving。

    - path: "terraform/**"
      instructions: >
        這是基礎設施 IaC。請特別檢查：
        1. 是否會 destroy 既有重要資源；
        2. secret 是否可能進入 Terraform state；
        3. Helm release values 是否會造成 drift；
        4. ARC runner、Harbor、Kyverno、Argo CD 權限是否過大；
        5. imagePullSecret 是否同時支援 harbor.jlsa.local 與必要 registry host。

    - path: "k8s/**"
      instructions: >
        這是 Kubernetes / Kyverno manifest。請特別檢查：
        1. 是否使用 latest tag；
        2. 是否缺少 resources requests / limits；
        3. 是否使用 privileged、hostNetwork 或 root container；
        4. 是否會違反 Kyverno policy；
        5. 是否會讓 unsigned image 繞過 admission policy。

    - path: "src/**"
      instructions: >
        這是 App 程式碼。請特別檢查：
        1. XSS、unsafe HTML、open redirect；
        2. React hook dependency 是否正確；
        3. API error handling 是否安全；
        4. 是否會造成 ZAP DAST security header 或 CSP 問題。

tools:
  github-checks:
    enabled: true
    timeout_ms: 180000

  biome:
    enabled: true

  hadolint:
    enabled: true

  shellcheck:
    enabled: true

  markdownlint:
    enabled: true

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
