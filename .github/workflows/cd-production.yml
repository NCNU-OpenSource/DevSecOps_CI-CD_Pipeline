name: CD Production

on:
  workflow_run:
    workflows:
      - CD Staging
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-production-main
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: harbor.jlsa.local:30443
  IMAGE_NAME: ci/youtube-music-bot
  APP_NAME: youtube-music-bot
  APP_PORT: "3000"

  STAGING_NAMESPACE: staging-youtube-music-bot
  PRODUCTION_NAMESPACE: production-youtube-music-bot
  PRODUCTION_NODE_PORT: "31080"

  ARGOCD_NAMESPACE: argocd
  ARGOCD_PRODUCTION_APP: youtube-music-bot-production

  GITOPS_REPO_BRANCH: main
  GITOPS_STAGING_PATH: apps/youtube-music-bot/overlays/staging
  GITOPS_PRODUCTION_PATH: apps/youtube-music-bot/overlays/production

jobs:
  deploy-production:
    name: Promote GitOps Production
    runs-on: arc-runner-set
    timeout-minutes: 20
    environment: production

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Check Runner Tools
        run: |
          set -euo pipefail

          echo "Checking tools baked into ARC runner image..."
          kubectl version --client
          jq --version
          yq --version || true
          git --version
          curl --version | head -1
          python3 --version

      - name: Configure Kubernetes Auth
        env:
          K8S_KUBECONFIG_B64: ${{ secrets.K8S_KUBECONFIG_B64 }}
        run: |
          set -euo pipefail

          if [ -z "${K8S_KUBECONFIG_B64:-}" ]; then
            echo "K8S_KUBECONFIG_B64 is empty."
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/kube"

          printf "%s" "$K8S_KUBECONFIG_B64" \
            | base64 -d > "$RUNNER_TEMP/kube/config"

          chmod 600 "$RUNNER_TEMP/kube/config"

          echo "KUBECONFIG=$RUNNER_TEMP/kube/config" >> "$GITHUB_ENV"
          export KUBECONFIG="$RUNNER_TEMP/kube/config"

          echo "Testing Kubernetes API access..."
          kubectl get --raw=/version

          echo "Current context:"
          kubectl config current-context

      - name: Check VM3 Node Label
        run: |
          set -euo pipefail

          echo "Checking node3 labels..."
          kubectl get node node3 --show-labels

          NODE3_DEDICATED="$(kubectl get node node3 -o jsonpath='{.metadata.labels.dedicated}')"

          if [ "${NODE3_DEDICATED}" != "production-storage" ]; then
            echo "node3 does not have label dedicated=production-storage"
            exit 1
          fi

          echo "node3 label OK: dedicated=production-storage"

      - name: Update GitOps Production Digest
        env:
          GITOPS_REPO_TOKEN: ${{ secrets.GITOPS_REPO_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GITOPS_REPO_TOKEN:-}" ]; then
            echo "GITOPS_REPO_TOKEN is empty."
            exit 1
          fi

          GITOPS_DIR="$RUNNER_TEMP/gitops"

          echo "Cloning GitOps repo..."
          git clone \
            --branch "${GITOPS_REPO_BRANCH}" \
            "https://x-access-token:${GITOPS_REPO_TOKEN}@github.com/Julie08080808/youtube-music-bot-gitops.git" \
            "${GITOPS_DIR}"

          cd "${GITOPS_DIR}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          STAGING_KUSTOMIZATION="${GITOPS_STAGING_PATH}/kustomization.yaml"
          PRODUCTION_KUSTOMIZATION="${GITOPS_PRODUCTION_PATH}/kustomization.yaml"

          if [ ! -f "${STAGING_KUSTOMIZATION}" ]; then
            echo "Staging kustomization not found: ${STAGING_KUSTOMIZATION}"
            exit 1
          fi

          if [ ! -f "${PRODUCTION_KUSTOMIZATION}" ]; then
            echo "Production kustomization not found: ${PRODUCTION_KUSTOMIZATION}"
            exit 1
          fi

          STAGING_DIGEST="$(grep -A2 'name: harbor.jlsa.local:30443/ci/youtube-music-bot' "${STAGING_KUSTOMIZATION}" \
            | grep 'digest:' \
            | awk '{print $2}')"

          if [ -z "${STAGING_DIGEST}" ]; then
            echo "Failed to resolve staging digest from GitOps repo."
            exit 1
          fi

          case "${STAGING_DIGEST}" in
            sha256:*)
              echo "Staging digest format OK."
              ;;
            *)
              echo "Invalid staging digest format: ${STAGING_DIGEST}"
              exit 1
              ;;
          esac

          PRODUCTION_IMAGE="${REGISTRY}/${IMAGE_NAME}@${STAGING_DIGEST}"

          echo "STAGING_DIGEST=${STAGING_DIGEST}" >> "$GITHUB_ENV"
          echo "PRODUCTION_IMAGE=${PRODUCTION_IMAGE}" >> "$GITHUB_ENV"

          echo "Promoting staging digest to production:"
          echo "${STAGING_DIGEST}"

          echo "Before production update:"
          cat "${PRODUCTION_KUSTOMIZATION}"

          STAGING_DIGEST="${STAGING_DIGEST}" \
          GITOPS_KUSTOMIZATION="${PRODUCTION_KUSTOMIZATION}" \
          python3 - << 'PY'
          import os
          import re
          from pathlib import Path

          path = Path(os.environ["GITOPS_KUSTOMIZATION"])
          digest = os.environ["STAGING_DIGEST"]

          text = path.read_text()

          new_text, count = re.subn(
              r'(^\s*digest:\s*).+$',
              r'\1' + digest,
              text,
              count=1,
              flags=re.MULTILINE,
          )

          if count != 1:
              raise SystemExit("Failed to update digest line in production kustomization.yaml")

          path.write_text(new_text)
          PY

          echo "After production update:"
          cat "${PRODUCTION_KUSTOMIZATION}"

          git status --short

          if git diff --quiet; then
            echo "GitOps production digest already up to date."
            exit 0
          fi

          git add "${PRODUCTION_KUSTOMIZATION}"
          git commit -m "gitops: promote staging digest to production"
          git push origin "${GITOPS_REPO_BRANCH}"

          echo "GitOps production digest updated."

      - name: Wait for Argo CD Production Sync
        run: |
          set -euo pipefail

          echo "Requesting Argo CD hard refresh..."

          kubectl annotate application "${ARGOCD_PRODUCTION_APP}" \
            -n "${ARGOCD_NAMESPACE}" \
            argocd.argoproj.io/refresh=hard \
            --overwrite

          echo "Waiting for Argo CD production app to become Synced and Healthy..."

          for i in $(seq 1 90); do
            SYNC_STATUS="$(kubectl get application "${ARGOCD_PRODUCTION_APP}" \
              -n "${ARGOCD_NAMESPACE}" \
              -o jsonpath='{.status.sync.status}' 2>/dev/null || true)"

            HEALTH_STATUS="$(kubectl get application "${ARGOCD_PRODUCTION_APP}" \
              -n "${ARGOCD_NAMESPACE}" \
              -o jsonpath='{.status.health.status}' 2>/dev/null || true)"

            echo "Attempt ${i}: sync=${SYNC_STATUS:-unknown}, health=${HEALTH_STATUS:-unknown}"

            if [ "${SYNC_STATUS}" = "Synced" ] && [ "${HEALTH_STATUS}" = "Healthy" ]; then
              echo "Argo CD production app is Synced and Healthy."
              break
            fi

            sleep 5
          done

          SYNC_STATUS="$(kubectl get application "${ARGOCD_PRODUCTION_APP}" \
            -n "${ARGOCD_NAMESPACE}" \
            -o jsonpath='{.status.sync.status}')"

          HEALTH_STATUS="$(kubectl get application "${ARGOCD_PRODUCTION_APP}" \
            -n "${ARGOCD_NAMESPACE}" \
            -o jsonpath='{.status.health.status}')"

          if [ "${SYNC_STATUS}" != "Synced" ] || [ "${HEALTH_STATUS}" != "Healthy" ]; then
            echo "Argo CD production app did not become Synced and Healthy."
            kubectl describe application "${ARGOCD_PRODUCTION_APP}" -n "${ARGOCD_NAMESPACE}"
            exit 1
          fi

      - name: Verify Production Deployment
        run: |
          set -euo pipefail

          echo "Waiting for production rollout..."
          kubectl rollout status deployment/${APP_NAME} \
            -n "${PRODUCTION_NAMESPACE}" \
            --timeout=180s

          LIVE_IMAGE="$(kubectl get deployment "${APP_NAME}" \
            -n "${PRODUCTION_NAMESPACE}" \
            -o jsonpath='{.spec.template.spec.containers[0].image}')"

          echo "Expected image: ${PRODUCTION_IMAGE}"
          echo "Live image:     ${LIVE_IMAGE}"

          if [ "${LIVE_IMAGE}" != "${PRODUCTION_IMAGE}" ]; then
            echo "Production live image does not match expected image."
            exit 1
          fi

          POD_NODE="$(kubectl get pod -n "${PRODUCTION_NAMESPACE}" \
            -l app="${APP_NAME}" \
            -o jsonpath='{.items[0].spec.nodeName}')"

          echo "Production pod node: ${POD_NODE}"

          if [ "${POD_NODE}" != "node3" ]; then
            echo "Production pod is not running on node3."
            exit 1
          fi

          kubectl get pods -n "${PRODUCTION_NAMESPACE}" -o wide
          kubectl get svc -n "${PRODUCTION_NAMESPACE}"

      - name: Smoke Test Production
        run: |
          set -euo pipefail

          PRODUCTION_CLUSTER_URL="http://${APP_NAME}.${PRODUCTION_NAMESPACE}.svc.cluster.local:${APP_PORT}"

          echo "Testing production service inside cluster:"
          echo "${PRODUCTION_CLUSTER_URL}"

          for i in $(seq 1 30); do
            if curl -fsS "${PRODUCTION_CLUSTER_URL}" > /tmp/production-response.html; then
              echo "Production cluster smoke test passed."
              head -20 /tmp/production-response.html || true
              exit 0
            fi

            echo "Waiting for production service... ${i}"
            sleep 5
          done

          echo "Production smoke test failed."
          kubectl get pods -n "${PRODUCTION_NAMESPACE}" -o wide
          kubectl describe deployment "${APP_NAME}" -n "${PRODUCTION_NAMESPACE}"
          exit 1

      - name: Write Production Summary
        if: always()
        run: |
          echo "## GitOps CD Production Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Namespace | \`${PRODUCTION_NAMESPACE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| App | \`${APP_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${PRODUCTION_IMAGE:-not-resolved}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Argo CD App | \`${ARGOCD_PRODUCTION_APP}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitOps Path | \`${GITOPS_PRODUCTION_PATH}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Node Selector | \`dedicated=production-storage\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Expected Node | \`node3\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster URL | \`http://${APP_NAME}.${PRODUCTION_NAMESPACE}.svc.cluster.local:${APP_PORT}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| NodePort | \`${PRODUCTION_NODE_PORT}\` |" >> "$GITHUB_STEP_SUMMARY"
